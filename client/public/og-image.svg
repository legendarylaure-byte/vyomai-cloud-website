<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D0B1A"/>
      <stop offset="50%" stop-color="#1E1548"/>
      <stop offset="100%" stop-color="#0D0B1A"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8a50e8"/>
      <stop offset="50%" stop-color="#c060d0"/>
      <stop offset="100%" stop-color="#e07040"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#8a50e8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#8a50e8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="60%" r="35%">
      <stop offset="0%" stop-color="#c060d0" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#c060d0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow effects -->
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Decorative orbital ring -->
  <circle cx="600" cy="315" r="220" fill="none" stroke="url(#brand)" stroke-width="1" opacity="0.15"/>
  <circle cx="600" cy="315" r="180" fill="none" stroke="url(#brand)" stroke-width="0.5" opacity="0.1"/>
  <circle cx="600" cy="315" r="140" fill="none" stroke="url(#brand)" stroke-width="0.5" opacity="0.08"/>

  <!-- Orbital node -->
  <circle cx="820" cy="315" r="4" fill="#8a50e8" opacity="0.6"/>

  <!-- VyomAi Logo mark -->
  <g transform="translate(520, 180)">
    <circle cx="80" cy="80" r="60" fill="none" stroke="url(#brand)" stroke-width="2" opacity="0.3"/>
    <circle cx="80" cy="80" r="40" fill="none" stroke="url(#brand)" stroke-width="1.5" opacity="0.2"/>
    <circle cx="80" cy="20" r="5" fill="#8a50e8" opacity="0.8"/>
    <text x="80" y="90" text-anchor="middle" font-family="system-ui, sans-serif" font-size="36" font-weight="700" fill="url(#brand)">V</text>
  </g>

  <!-- Company name -->
  <text x="600" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="52" font-weight="700" fill="white" letter-spacing="-0.02em">VyomAi Cloud</text>

  <!-- Tagline -->
  <text x="600" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="400" fill="#a0a0c0" letter-spacing="0.05em">AI Solutions from Nepal to the World</text>

  <!-- Brand gradient line -->
  <rect x="500" y="415" width="200" height="3" rx="1.5" fill="url(#brand)" opacity="0.6"/>

  <!-- Bottom text -->
  <text x="600" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="400" fill="#606080">vyomai.cloud</text>

  <!-- Decorative dots -->
  <circle cx="100" cy="550" r="2" fill="#8a50e8" opacity="0.3"/>
  <circle cx="150" cy="520" r="1.5" fill="#c060d0" opacity="0.2"/>
  <circle cx="1100" cy="80" r="2" fill="#e07040" opacity="0.3"/>
  <circle cx="1050" cy="110" r="1.5" fill="#8a50e8" opacity="0.2"/>
  <circle cx="200" cy="100" r="1" fill="#c060d0" opacity="0.15"/>
  <circle cx="1000" cy="530" r="1" fill="#e07040" opacity="0.15"/>
</svg>
